<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Building body -->
  <rect x="15" y="30" width="70" height="65" rx="3" ry="3" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>
  
  <!-- Roof -->
  <rect x="10" y="22" width="80" height="12" rx="3" ry="3" fill="#E53935"/>
  
  <!-- Red cross on roof -->
  <rect x="46" y="15" width="8" height="24" rx="2" fill="white"/>
  <rect x="38" y="23" width="24" height="8" rx="2" fill="white"/>

  <!-- Windows left top -->
  <rect x="22" y="42" width="16" height="16" rx="2" fill="#90CAF9" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Windows right top -->
  <rect x="62" y="42" width="16" height="16" rx="2" fill="#90CAF9" stroke="#64B5F6" stroke-width="1.5"/>

  <!-- Windows left bottom -->
  <rect x="22" y="66" width="16" height="16" rx="2" fill="#90CAF9" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Windows right bottom -->
  <rect x="62" y="66" width="16" height="16" rx="2" fill="#90CAF9" stroke="#64B5F6" stroke-width="1.5"/>

  <!-- Door -->
  <rect x="39" y="68" width="22" height="27" rx="2" fill="#795548"/>
  <!-- Door knob -->
  <circle cx="57" cy="82" r="2" fill="#FFD700"/>

  <!-- Red cross on building -->
  <rect x="47" y="52" width="6" height="18" rx="1.5" fill="#E53935"/>
  <rect x="41" y="58" width="18" height="6" rx="1.5" fill="#E53935"/>
</svg>
