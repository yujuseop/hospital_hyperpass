spring:
  application:
    name: hospital-hyper-pass
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hyperpass}
    username: ${DB_USERNAME:hyperpass}
    password: ${DB_PASSWORD:hyperpass}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hyperpass.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${PORT:8080}

hyperpass:
  security:
    # 운영 환경: AES_SECRET_KEY 환경변수로 반드시 교체 (openssl rand -base64 32)
    aes-key: ${AES_SECRET_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  jwt:
    # 운영 환경: JWT_SECRET 환경변수로 반드시 교체 (openssl rand -base64 32), AES 키와 다른 값 사용
    secret: ${JWT_SECRET:BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=}
    expiration: 3600000
